<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>KDS - Bony Kuchenne</title>
    <style>
        body { background: #050505; color: #fff; font-family: sans-serif; padding: 20px; margin: 0; }
        h1 { color: #d4af37; margin-top: 0; text-align: center; border-bottom: 2px solid #333; padding-bottom: 10px;}
        #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; align-items: start; margin-top: 20px;}
        .ticket { background: #fff9c4; color: #000; padding: 15px; border-radius: 8px; border-top: 10px solid #b71c1c; box-shadow: 0 4px 15px rgba(0,0,0,0.5); transition: 0.3s;}
        .ticket.all-ready { border-top-color: #2e7d32; background: #e8f5e9; opacity: 0.85; }
        .late-blink { animation: blink-red 1s infinite; border: 4px solid #ff5252; }
        @keyframes blink-red { 0%, 100% { background-color: #fff9c4; } 50% { background-color: #ffcccc; } }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px dashed #888; padding-bottom: 10px; margin-bottom: 10px; }
        .timer { font-size: 1.5em; font-weight: bold; background: #333; color: white; padding: 5px 10px; border-radius: 5px; }
        .late-blink .timer { background: #b71c1c; animation: pulse-text 1s infinite; }
        @keyframes pulse-text { 50% { transform: scale(1.1); } }
        .line { border-bottom: 1px solid #ddd; padding: 12px 0; display: flex; flex-direction: column; gap: 8px; }
        .line:last-child { border-bottom: none; }
        .line-info { display: flex; align-items: center; gap: 10px; font-size: 1.3em; }
        .note { color: #d32f2f; font-weight: bold; font-size: 0.95em; margin-top: 2px; background: #ffcdd2; padding: 6px; border-radius: 4px; display: inline-block; border-left: 4px solid #b71c1c;}
        .prod-name { font-weight: bold; }
        .qty { font-weight: bold; background: #000; color: #fff; padding: 5px 12px; text-align: center; border-radius: 4px; font-size: 1.1em; }
        .btns { display: flex; gap: 8px; width: 100%; margin-top: 8px; }
        .btn { padding: 15px; border: none; cursor: pointer; font-weight: bold; color: white; font-size: 0.95em; flex: 1; border-radius: 6px; transition: 0.2s; text-transform: uppercase;}
        .btn:active { transform: scale(0.95); }
        .btn:disabled { background: #bdbdbd !important; color: #757575 !important; cursor: not-allowed; box-shadow: none; transform: none; }
    </style>
</head>
<body>
    <h1>🔥 KDS - KUCHNIA 🔥</h1>
    <div id="grid"></div>
    <script>
        let activeGroups = {};

        async function loadData() {
            try {
                const res = await fetch('/api/all_orders');
                const data = await res.json();
                
                // MOCNY FILTR: tylko to, co nie jest zamknięte i wymuszenie to_kitchen !== false
                const active = data.orders.filter(o => 
                    ['nowe', 'preparing', 'ready'].includes(o.status) && 
                    o.to_kitchen !== false && o.to_kitchen !== "false"
                );
                
                const groups = {};
                active.forEach(o => {
                    if(!groups[o.table_number]) groups[o.table_number] = {items:{}, order_time: o.time_ordered, hasUnready: false};
                    if(new Date(o.time_ordered) < new Date(groups[o.table_number].order_time)) groups[o.table_number].order_time = o.time_ordered;
                    if(o.status !== 'ready') groups[o.table_number].hasUnready = true;
                    const k = o.burger_name + (o.note || "") + o.status;
                    if(!groups[o.table_number].items[k]) groups[o.table_number].items[k] = {n:o.burger_name, q:0, note:o.note, status:o.status, ids:[]};
                    groups[o.table_number].items[k].q++;
                    groups[o.table_number].items[k].ids.push(o.id);
                });
                activeGroups = groups;
                renderKDS();
            } catch(e) { console.error("Błąd KDS:", e); }
        }

        function renderKDS() {
            let html = '';
            const now = new Date();
            for(const [tbl, g] of Object.entries(activeGroups)) {
                const diffSec = Math.floor((now - new Date(g.order_time)) / 1000);
                const isLate = diffSec >= 300 && g.hasUnready; 
                const allReady = !g.hasUnready; 
                const min = Math.floor(diffSec / 60); const sec = (diffSec % 60).toString().padStart(2, '0');

                html += `<div class="ticket ${isLate ? 'late-blink' : ''} ${allReady ? 'all-ready' : ''}">
                    <div class="header"><h2 style="margin:0; font-size:1.8em;">STÓŁ ${tbl}</h2><div class="timer">${min}:${sec}</div></div>
                    <div>
                    ${Object.values(g.items).map(i => {
                        let btnSmaz = `<button class="btn" style="background:#ff9800" onclick="updLine('${i.ids.join(',')}', 'preparing')">SMAŻ</button>`;
                        let btnGotowe = `<button class="btn" disabled>GOTOWE</button>`;
                        if(i.status === 'preparing') { btnSmaz = `<button class="btn" disabled>SMAŻY SIĘ...</button>`; btnGotowe = `<button class="btn" style="background:#2e7d32" onclick="updLine('${i.ids.join(',')}', 'ready')">GOTOWE</button>`; } 
                        else if(i.status === 'ready') { btnSmaz = `<button class="btn" disabled>WYDANE NA BLAT</button>`; btnGotowe = `<button class="btn" disabled>CZEKA NA KELNERA</button>`; }
                        return `<div class="line">
                            <div class="line-info"><span class="qty">${i.q}x</span><span class="prod-name">${i.n}</span></div>
                            ${i.note ? `<div class="note">⚠️ UWAGA: ${i.note}</div>` : ''}
                            <div class="btns">${btnSmaz}${btnGotowe}</div>
                        </div>`;
                    }).join('')}
                    </div></div>`;
            }
            document.getElementById('grid').innerHTML = html || "<h2 style='text-align:center; color:#555; width: 100%; margin-top:50px; font-size:2em;'>Cisza na kuchni...</h2>";
        }

        async function updLine(idsStr, s) {
            await Promise.all(idsStr.split(',').map(id => fetch(`/api/update_status/${id}`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({status:s}) })));
            loadData();
        }

        setInterval(renderKDS, 1000); setInterval(loadData, 3000); loadData();
    </script>
</body>
</html>
